name: "HDHomeRun Guide Auth Sync"
guid: "2e08612f-3c3f-449b-a672-9ccb56495f12"
version: "1.2.0.0"
targetAbi: "10.11.0.0"
framework: "net9.0"
overview: "Keeps the HDHomeRun XMLTV guide DeviceAuth key in sync with Jellyfin's Live TV listings provider."
description: >
  Periodically checks your configured HDHomeRun tuners for their current
  guide DeviceAuth key (via each tuner's local /discover.json) and updates
  the XMLTV listings provider URL in Jellyfin's Live TV configuration if
  the key changes.
category: "Live TV"
owner: "garthvh"
artifacts:
  - HDHomeRunAuthPlugin.dll
changelog: >
  - 1.2.0.0: Default sync interval changed from 12 to 4 hours.
  - 1.1.0.0: Queue Jellyfin's Refresh Guide task automatically after updating
    the DeviceAuth key.
  - 1.0.0.0: Initial release.
